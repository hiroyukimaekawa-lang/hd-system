<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Google Maps Scraper</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <h2>Google Maps Scraper</h2>
      <p class="subtitle">店舗リスト自動抽出ツール</p>
      <div id="query-display" class="query-info">
        <span>📍 現在の検索:</span>
        <span id="current-query">読み込み中...</span>
      </div>
    </header>

    <div class="status-panel">
      <div id="status-indicator" class="indicator inactive"></div>
      <p id="status-text">Googleマップの検索結果ページを開いてください</p>
    </div>

    <div class="control-panel">
      <div class="form-group">
        <label for="max-items">最大取得件数: <span id="max-items-val">50</span>件</label>
        <input type="range" id="max-items" min="10" max="500" step="10" value="50">
        <div class="helper-text">※右端で制限なし</div>
      </div>

      <div class="button-group">
        <button id="btn-start" class="btn primary">▶ 取得開始</button>
        <button id="btn-stop" class="btn danger" disabled>■ 停止</button>
        <button id="btn-reset" class="btn secondary">↺ リセット</button>
        <button id="btn-download" class="btn success" disabled>⬇ CSVダウンロード</button>
      </div>
    </div>

    <div class="filter-panel" style="margin-bottom: 12px; background-color: #e8f0fe; border-left: 4px solid #1a73e8;">
      <h3>1. 検索エリア・キーワード</h3>
      <div class="form-group" style="margin-bottom: 8px;">
        <label for="search-area">エリア (例: 八潮市, 渋谷区):</label>
        <input type="text" id="search-area" class="input-text" placeholder="エリアを入力">
      </div>
      <div class="form-group">
        <label for="search-keyword">ジャンル・キーワード (例: お好み焼き):</label>
        <input type="text" id="search-keyword" class="input-text" placeholder="キーワードを入力">
      </div>
      <button id="btn-open-map" class="btn primary" style="width: 100%; margin-top: 10px; background-color: #1a73e8;">🔍
        この条件でGoogleマップを開く</button>
      <div class="helper-text" style="margin-top: 4px; text-align: left;">※このキーワードがCSVのファイル名になります</div>
    </div>

    <div class="filter-panel">
      <h3>2. 取得条件・ジャンル絞り込み</h3>
      <div class="form-group">
        <label for="target-genres">抽出対象とするジャンル (カンマ区切り):</label>
        <textarea id="target-genres" placeholder="例: レストラン, イタリア料理店, 居酒屋" rows="2"></textarea>

        <label style="margin-top: 8px;">飲食業種クイック選択 (チェックボックス):</label>
        <div id="preset-genres" class="preset-container">
        </div>

        <div id="suggested-genres" class="chip-container">
        </div>
        <button id="btn-fetch-genres" class="btn secondary-sm">現在のページからジャンルを読み込む</button>
        <div class="helper-text" style="margin-top: 4px; text-align: left;">※未入力なら全ジャンルを取得</div>
      </div>
    </div>

    <div class="preview-panel">
      <h3>取得済みデータ: <span id="count-display">0</span>件</h3>
      <div class="table-container">
        <table id="preview-table">
          <thead>
            <tr>
              <th>店舗名</th>
              <th>ジャンル</th>
              <th>電話番号</th>
              <th>営業時間</th>
              <th>定休日</th>
            </tr>
          </thead>
          <tbody id="preview-body">
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
