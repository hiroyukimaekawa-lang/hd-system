<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPB サロンリスト取得</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --accent: #e94560;
      --green: #4ecca3;
      --yellow: #ffd460;
      --red: #e94560;
      --muted: #8892b0;
      --text: #ccd6f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 400px;
      min-height: 500px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      font-size: 13px;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
    }

    .header-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.running {
      background: var(--green);
      animation: pulse 1s infinite;
    }

    .dot.done {
      background: var(--green);
    }

    .dot.error {
      background: var(--red);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .4;
      }
    }

    .status-text .main {
      font-size: 13px;
      font-weight: 600;
    }

    .status-text .sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .progress-wrap {
      height: 3px;
      background: var(--border);
    }

    .progress-bar {
      height: 100%;
      background: var(--green);
      transition: width .3s;
      width: 0;
    }

    .controls {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-row label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    input[type=range] {
      flex: 1;
      accent-color: var(--green);
    }

    .slider-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      min-width: 60px;
      text-align: right;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }

    .btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .btn-start {
      background: var(--green);
      color: #0a0a0a;
    }

    .btn-stop {
      background: var(--red);
      color: #fff;
    }

    .btn-dl {
      background: var(--border);
      color: var(--text);
    }

    .btn-genre {
      background: var(--yellow);
      color: #0a0a0a;
      font-size: 11px;
    }

    .log-area {
      margin: 0 16px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      height: 150px;
      overflow: hidden;
    }

    .log-scroll {
      height: 100%;
      overflow-y: auto;
      padding: 8px;
    }

    .log-line {
      font-size: 11px;
      line-height: 1.6;
      font-family: monospace;
      color: var(--muted);
    }

    .log-line.good {
      color: var(--green);
    }

    .log-line.err {
      color: var(--red);
    }

    .log-line.warn {
      color: var(--yellow);
    }

    .preview-section {
      margin: 0 16px 12px;
    }

    .preview-section h3 {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .preview-list {
      max-height: 160px;
      overflow-y: auto;
    }

    .preview-item {
      padding: 6px 8px;
      margin-bottom: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .pi-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .pi-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .pi-phone {
      color: var(--green);
    }
  </style>
</head>

<body>
  <div class="header">
    <div>
      <div class="header-title">💇 HPB サロンリスト取得</div>
      <div class="header-sub">ホットペッパービューティー専用 v3.3.0</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <div class="status-text">
      <div class="main" id="statusMain">待機中</div>
      <div class="sub" id="statusSub">一覧ページを開いて取得開始を押してください</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="controls">
    <div class="slider-row">
      <label>取得上限</label>
      <input type="range" id="maxSlider" min="10" max="500" step="10" value="100">
      <span class="slider-val" id="maxVal">100件</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="startBtn">▶ 取得開始</button>
      <button class="btn btn-stop" id="stopBtn" disabled>⏹ 停止</button>
      <button class="btn btn-dl" id="dlBtn" disabled>⬇ CSV</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-genre" id="popularGenreBtn">🗂 条件一括取得</button>
    </div>
  </div>

  <div class="log-area">
    <div class="log-scroll" id="logScroll"></div>
  </div>

  <div class="preview-section" id="previewSection" style="display:none;">
    <h3>取得結果プレビュー（最新30件）</h3>
    <div class="preview-list" id="previewList"></div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
